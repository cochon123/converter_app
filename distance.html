<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distance Converter Mock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!--
    Student Name:
    Date: May 27, 2026
    Program Description: This page is a rough mockup for the assignment unit converter app. It currently implements only the distance converter page. The user can enter either one distance value or a comma-separated list of distance values. JavaScript processes the selected conversion direction and displays miles-to-kilometres or kilometres-to-miles results.
  -->

  <nav class="p-4 border-b">
    <h1 class="text-2xl font-bold">Unit Converter</h1>
    <div class="mt-4 flex gap-2">
      <a href="weight.html"><button class="border p-2">Weight</button></a>
      <a href="distance.html"><button class="border p-2 bg-gray-200">Distance</button></a>
      <a href="temperature.html"><button class="border p-2">Temperature</button></a>
    </div>
  </nav>

  <main class="p-4">
    <h2 class="text-xl font-bold">Distance Converter</h2>

    <form id="distanceForm" class="mt-4">
      <div class="mb-4">
        <label for="conversionType" class="block">Conversion Type</label>
        <select id="conversionType" class="border p-2 w-full">
          <option value="miles-km">Miles to Kilometres</option>
          <option value="km-miles">Kilometres to Miles</option>
        </select>
      </div>

      <div class="mb-4">
        <label for="singleValue" class="block">Single Value</label>
        <input id="singleValue" type="number" step="any" class="border p-2 w-full" placeholder="Example: 10">
        <button type="button" id="convertSingle" class="border p-2 mt-2">Convert Single Value</button>
      </div>

      <div class="mb-4">
        <label for="valueList" class="block">List of Values</label>
        <input id="valueList" type="text" class="border p-2 w-full" placeholder="Example: 1, 5, 10">
        <button type="button" id="convertList" class="border p-2 mt-2">Convert List</button>
      </div>

      <div class="border p-4">
        <h3 class="font-bold">Result</h3>
        <p id="result">No conversion yet.</p>
      </div>
    </form>
  </main>

  <script src="/distance.ts" type="module"></script>
</body>
</html>
